<!DOCTYPE html>
<!--
  Vivodepot — Lese-App (Empfänger-Workflow)
  Komponente 2 der Vier-Komponenten-Architektur (ADR-098). Eigenständige Single-File-HTML.
  READ-ONLY: liest ein zugesandtes Depot oder einen QR-Code, schreibt NIE, hält keine Daten
  zwischen Sessions. Kein localStorage/sessionStorage/IndexedDB/Cookies. Keine Netz-Zugriffe.
  Der VdCrypto-Block (Script 1) ist byte-identisch zur Bürger-App (Hash 6eb590…); der JWS-Block
  + Test-Sentinel ebenso. Alle Bibliotheken inline. Kein Kamera-Scan (U2-ADR-085 §5: ersatzlos
  entfernt, kein Erzeuger mehr nach CC-01/CC-08) — Datei-Öffnen und QR-Text-Einfügen sind die
  beiden Eingangswege.
-->

  <style>

      --akzent: #3d5a2a;
      --tinte: #1f2328;
      --tinte-weich: #5a626b;
      --linie: #e3e1da;
      --flaeche: #ffffff;
      --flaeche-warm: #faf8f3;
      --leer: #9aa0a6;
      --warn-bg: #fff4e5;
      --warn-tinte: #8a5300;

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--tinte);
      background: var(--flaeche-warm);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3 { font-weight: 600; color: var(--tinte); }

      font: inherit; cursor: pointer; border: none; border-radius: 8px;
      padding: 10px 18px; background: var(--akzent); color: #fff; font-weight: 600;
      transition: filter .15s;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn-sek { background: transparent; color: var(--akzent); border: 1.5px solid var(--akzent); }

    .welcome-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 20px; }
    .welcome { max-width: 640px; width: 100%; background: var(--flaeche); border: 1px solid var(--linie); border-radius: 16px; padding: 40px 36px; box-shadow: 0 6px 28px rgba(31,35,40,.06); }

    .welcome-text p { margin: 0 0 12px; color: var(--tinte-weich); }

    .weg-titel { font-weight: 600; color: var(--tinte); }

    .sheet-aktionen { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; flex-wrap: wrap; }

       VdCrypto.setupSession(passwort, saltBytes)  -> Promise<void>
       VdCrypto.encryptDepot(obj, key, aad?)       -> Promise<{iv, ct}>
       VdCrypto.decryptDepot(stored, key, aad?)    -> Promise<obj>
   • Verschlüsselungs-Parameter sind in den AAD-Blöcken gebunden — beim
     Entschlüsseln dieselbe AAD übergeben, sonst schlägt GCM fehl (das ist
     gewollt: Manipulations- und Falschpasswort-Erkennung).

   Herkunft (Zeilen in VIVODEPOT.html):
     Konstanten            13610–13616, 14138–14151
     Modul-Zustand         14153, 14164–14165
     deriveMasterBits      14285–14295
     importMasterAesKey    14298–14303
     importMasterHkdfKey   14306–14310
     deriveKey             14218–14226
     deriveKeyLegacy       14229–14238
     encryptData           14240–14250
     decryptData           14252–14259
     deriveSubKey (v1)     14317–14331
     deriveDepotKeyV2      14344–14364
     _deriveHkdfRaw (Test) 14371–14382
     base64-Helfer         14386–14392
     setupMasterSession    14406–14411
     VdCrypto-Surface      14437–14442

   Nicht in diesem Block (kommen mit den jeweiligen Modulen):
     • Angehörigen-Krypto (eigener Salt/IV, Klasse-A-Trennung, ADR-052)
       → gehört zum Übergaben-Modul (ca. Z. 14444 ff.).
     • _verifyJWS (in der VdCrypto-Surface referenziert) → gehört zur
       VC-/Issuer-Schicht. Solange kein VC-Modul andockt, kann der Verweis

/* ── Konstanten ───────────────────────────────────────────────────────── */

// Check if encryption is available
const CRYPTO_AVAILABLE = !!(window.crypto && window.crypto.subtle);

// AP1-Krypto-Aufrüstung: Iterationszahl als Konstante (OWASP PBKDF2-HMAC-SHA256 Empfehlung 2024)
const PBKDF2_ITERATIONS = 600000;
// B2/v3 (2026-06-12): Legacy-200k-Pfad ersatzlos entfernt (deriveKeyLegacy + PBKDF2_ITERATIONS_LEGACY).

const HKDF_INFO_SUBDEPOT_V1   = 'vivodepot-subdepot-v1';
// KRYPTO-KRITISCH (B2/v3): EIN Domain-Sep-Pfad für Anker UND Sub (ADR-068 v2: „Anker IST ein Depot").
// Identifier-Name als stabiles Label belassen (in Hülle/Tests verdrahtet); Krypto-Generation = v3.
// Domain-separiert/präfixfrei: 'vivodepot/v3/depot/' + depotUUID. Kein String ist Präfix eines anderen.
const HKDF_INFO_DEPOT_V2_PREFIX = 'vivodepot/v3/depot/';
const HKDF_HASH = 'SHA-256';
const HKDF_KEY_LENGTH_BITS = 256;
const SUBDEPOT_CRYPTO_SALT_LENGTH_BYTES = 32;
const CRYPTO_VERSION_AKTUELL = 3; // B2/v3 (2026-06-12): Schlüsseltrennung — PBKDF2-Bits nur noch HKDF-Eingang; war 2.
// ADR-085-Nachtrag: Harte Allowlist — kein Try-Catch-Fallback für unbekannte Versionen.
// B2/v3 (2026-06-12): Release ist v3-only. Keine Lese-Pfade für v1/v2 mehr.
const KRYPTO_VERSION_ALLOWLIST = [3];
// ADR-085-Nachtrag: AAD-Blöcke für AES-GCM-Bindung der Krypto-Parameter.
// Depot-Pfad (HKDF-abgeleitete Sub-Keys): kdfTyp 'hkdf-sha256'.
// Übergabe-Pfad (direkter PBKDF2-Schlüssel): kdfTyp 'pbkdf2-sha256'.
// Identifier-Namen (_AAD_*_V2) als stabile Labels belassen; kryptoVersion-Feld = 3.
const _AAD_DEPOT_V2 = Object.freeze({ kryptoVersion: 3, iterationen: PBKDF2_ITERATIONS, kdfTyp: 'hkdf-sha256' });
const _AAD_UEBERGABE_V2 = Object.freeze({ kryptoVersion: 3, iterationen: PBKDF2_ITERATIONS, kdfTyp: 'pbkdf2-sha256' });


/* ── Modul-Zustand (Session-only, NIE persistieren) ───────────────────── */

let sessionKey = null;
// AP 5.2 (ADR-052): Master-Schlüssel-Doppel-Repräsentation und Salt-Speicher.
let sessionHkdfKey = null;
let storedPbkdf2Salt = null;


/* ── Master-Bit-Ableitung und Schlüssel-Import ────────────────────────── */

// PBKDF2-600k → 256 raw bits (ArrayBuffer). Wird zwei Mal verwendet
// (importMasterAesKey + importMasterHkdfKey), danach defensiv überschrieben.
async function deriveMasterBits(password, salt) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']
  );
  return crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
    km,
    HKDF_KEY_LENGTH_BITS
  );
}

// Bits → AES-GCM-CryptoKey für ankerPerson-Verschlüsselung.
async function importMasterAesKey(bits) {
  return crypto.subtle.importKey(
    'raw', bits, { name: 'AES-GCM', length: HKDF_KEY_LENGTH_BITS },
    false, ['encrypt', 'decrypt']
  );
}

// Bits → HKDF-CryptoKey für Sub-Schlüssel-Ableitung (RFC 5869).
async function importMasterHkdfKey(bits) {
  return crypto.subtle.importKey(
    'raw', bits, { name: 'HKDF' }, false, ['deriveKey', 'deriveBits']
  );
}


/* ── deriveKey (Übergabe-Pfad, PBKDF2-600k → AES; Design, NICHT Legacy) ── */

// B2-Abgrenzung: Dieser direkte PBKDF2→AES-Pfad bleibt für Übergabe-Container
// (Empfänger ohne HKDF-Wurzel), inkl. AAD-kdfTyp 'pbkdf2-sha256'. Er ist die
// EINZIGE legitime Direkt-Bit→AES-Verwendung; der Session-/Anker-Pfad nutzt
// ausschließlich HKDF (Schlüsseltrennung).
async function deriveKey(password, salt) {
  // AP 5.2 (ADR-052, Plan §1.7): intern auf zwei-Schritt-Sequenz umgestellt
  // (deriveMasterBits + importMasterAesKey), Signatur unverändert. Funktional
  // identisch zur Beta-17-Implementation.
  const bits = await deriveMasterBits(password, salt);
  return importMasterAesKey(bits);
}

// B2/v3 (2026-06-12): deriveKeyLegacy (200k) ersatzlos entfernt — v3-only Release.


/* ── encryptData / decryptData (AES-256-GCM, optionaler AAD-Block) ────── */

async function encryptData(obj, key, aad = null) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const params = { name: 'AES-GCM', iv };
  if (aad !== null) params.additionalData = new TextEncoder().encode(JSON.stringify(aad));
  const ciphertext = await crypto.subtle.encrypt(params, key, enc.encode(JSON.stringify(obj)));
  return {
    iv: btoa(String.fromCharCode(...iv)),
    ct: btoa(Array.from(new Uint8Array(ciphertext), c => String.fromCharCode(c)).join(''))
  };
}

async function decryptData(stored, key, aad = null) {
  const iv = Uint8Array.from(atob(stored.iv), c=>c.charCodeAt(0));
  const ct = Uint8Array.from(atob(stored.ct), c=>c.charCodeAt(0));
  const params = { name: 'AES-GCM', iv };
  if (aad !== null) params.additionalData = new TextEncoder().encode(JSON.stringify(aad));
  const plain = await crypto.subtle.decrypt(params, key, ct);
  return JSON.parse(new TextDecoder().decode(plain));
}


/* ── Sub-Schlüssel-Ableitung (HKDF) — für Sub-Depots / Übergaben ──────── */

// HKDF mit fest codiertem Info-String → AES-GCM-Sub-Key für ein Sub-Depot.
// HISTORISCH (cryptoVersion 1): kein aktiver Aufrufer; v1-Container werden im
// v3-Release nicht mehr gelesen (Allowlist [3]). Funktion verbatim belassen
// (nicht zum Ausbau autorisiert). KRYPTO-KRITISCH.
async function deriveSubKey(masterHkdfKey, cryptoSalt) {
  const enc = new TextEncoder();
  return crypto.subtle.deriveKey(
    {
      name: 'HKDF',
      hash: HKDF_HASH,
      salt: cryptoSalt,
      info: enc.encode(HKDF_INFO_SUBDEPOT_V1),
    },
    masterHkdfKey,
    { name: 'AES-GCM', length: HKDF_KEY_LENGTH_BITS },
    false,
    ['encrypt', 'decrypt']
  );
}

// KRYPTO-KRITISCH (ADR-068 v2 Sprint 1): HKDF-Sub-Schlüssel pro Depot mit
// depotUUID als Info-String — pro-Depot-Eindeutigkeit für Anker UND Sub-Depots.
// Produktions-API für cryptoVersion 3 (B2/v3: Info-Pfad 'vivodepot/v3/depot/').
// Funktionsname als stabiles Label belassen (in Hülle/Tests verdrahtet).
async function deriveDepotKeyV2(masterHkdfKey, cryptoSalt, depotUUID) {
  if (!depotUUID || typeof depotUUID !== 'string' || depotUUID.length === 0) {
    throw new Error('deriveDepotKeyV2: depotUUID required (non-empty string)');
  }
  if (!(cryptoSalt instanceof Uint8Array) || cryptoSalt.length !== SUBDEPOT_CRYPTO_SALT_LENGTH_BYTES) {
    throw new Error('deriveDepotKeyV2: cryptoSalt must be Uint8Array of length ' + SUBDEPOT_CRYPTO_SALT_LENGTH_BYTES);
  }
  const enc = new TextEncoder();
  return crypto.subtle.deriveKey(
    {
      name: 'HKDF',
      hash: HKDF_HASH,
      salt: cryptoSalt,
      info: enc.encode(HKDF_INFO_DEPOT_V2_PREFIX + depotUUID),
    },
    masterHkdfKey,
    { name: 'AES-GCM', length: HKDF_KEY_LENGTH_BITS },
    false,
    ['encrypt', 'decrypt']
  );
}

// Test-Helper: HKDF mit VARIABLEM Info-String und VARIABLER Bit-Länge.
// Liefert raw bits (ArrayBuffer), nicht CryptoKey — für RFC-5869-Test-
// Vektor-Vergleich. NICHT vom Produktions-Code aufrufen.
async function _deriveHkdfRaw(masterHkdfKey, salt, info, lengthBits) {
  return crypto.subtle.deriveBits(
    {
      name: 'HKDF',
      hash: HKDF_HASH,
      salt,
      info,
    },
    masterHkdfKey,
    lengthBits
  );
}


/* ── Base64-Helfer für Krypto-Bytes (Salt, IV, Ciphertext) ────────────── */

function bytesToBase64(bytes) {
  const arr = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes);
  return btoa(String.fromCharCode.apply(null, arr));
}
function base64ToBytes(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}


/* ── Master-Session-Setup (Doppel-Repräsentation) ─────────────────────── */

// Zentrale Master-Session-Setup-Sequenz.
// B2/v3 (2026-06-12) — SCHLÜSSELTRENNUNG: Die PBKDF2-Bits werden NUR noch als
// HKDF-Eingangsmaterial importiert (sessionHkdfKey). Die frühere zweite
// Verwendung derselben Bits direkt als AES-GCM-Master-Schlüssel
// (`sessionKey = importMasterAesKey(bits)`) ist ENTFERNT — sie war in der
// Hülle nie gelesen (Anker wird via deriveDepotKeyV2/HKDF verschlüsselt,
// ADR-068 v2). sessionKey bleibt als null deklariert (block-interne Globale,
// in Surface-Kommentaren referenziert). ArrayBuffer-Overwrite-Disziplin: nach
// dem Import werden die raw bits via Uint8Array-View überschrieben (defensiv).
async function setupMasterSession(password, salt) {
  const bits = await deriveMasterBits(password, salt);
  sessionHkdfKey = await importMasterHkdfKey(bits);
  new Uint8Array(bits).fill(0);
}


/* ── Krypto-Modul-Surface (stabile Außen-API, ADR-085-Nachtrag D.9) ───── */
// Hinweis SP: _verifyJWS gehört zur VC-/Issuer-Schicht und ist NICHT in
// diesem Basis-Block. Solange kein VC-Modul andockt, den verifyJWS-Eintrag
// hier weglassen oder auf eine Stub-Funktion zeigen lassen.
const VdCrypto = Object.freeze({
  setupSession:  setupMasterSession,
  encryptDepot:  encryptData,
  decryptDepot:  decryptData,
  // verifyJWS:  _verifyJWS,   // ← erst aktivieren, wenn die VC-Schicht andockt
});
</script>

const JWS_TYP          = 'vc+jwt';   // JOSE typ-Header für Vivodepot-VCs
const JWS_ALG_PRIMAER  = 'EdDSA';    // Ed25519  (RFC 8037)
const JWS_ALG_FALLBACK = 'ES256';    // ECDSA P-256 + SHA-256  (RFC 7518)

/* ── base64url (RFC 7515 §2 / RFC 4648 §5) — ohne Padding ──────────────── */
function _jwsB64uFromBytes(bytes) {
  const arr = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes);
  let bin = '';
  for (let i = 0; i < arr.length; i++) bin += String.fromCharCode(arr[i]);
  return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function _jwsB64uToBytes(s) {
  const norm = String(s).replace(/-/g, '+').replace(/_/g, '/');
  const pad  = norm.length % 4 === 0 ? '' : '='.repeat(4 - (norm.length % 4));
  return Uint8Array.from(atob(norm + pad), c => c.charCodeAt(0));
}
function _jwsB64uFromString(str) { return _jwsB64uFromBytes(new TextEncoder().encode(str)); }
function _jwsB64uToString(s)     { return new TextDecoder().decode(_jwsB64uToBytes(s)); }

/* ── Algorithmus-Auflösung: CryptoKey → JOSE-alg, JOSE-alg → WebCrypto ──── */
function _jwsAlgFuerKey(key) {
  const name = key && key.algorithm && key.algorithm.name;
  if (name === 'Ed25519') return JWS_ALG_PRIMAER;
  if (name === 'ECDSA')   return JWS_ALG_FALLBACK;
  throw new Error('JWS: nicht unterstützter Schlüssel-Algorithmus: ' + name);
}
function _jwsWebCryptoParams(alg) {
  if (alg === 'EdDSA') return { name: 'Ed25519' };
  if (alg === 'ES256') return { name: 'ECDSA', hash: 'SHA-256' };
  throw new Error('JWS: unbekannter alg: ' + alg);
}

/* ── JWK → CryptoKey (Verify bzw. Sign) — Ed25519 primär, P-256 Fallback ── */
async function _jwsImportVerifyKey(jwk) {
  if (jwk && jwk.kty === 'OKP' && jwk.crv === 'Ed25519')
    return crypto.subtle.importKey('jwk', jwk, { name: 'Ed25519' }, true, ['verify']);
  if (jwk && jwk.kty === 'EC' && jwk.crv === 'P-256')
    return crypto.subtle.importKey('jwk', jwk, { name: 'ECDSA', namedCurve: 'P-256' }, true, ['verify']);
  throw new Error('JWS: nicht unterstützter Verify-Schlüssel (kty/crv): ' + (jwk && jwk.kty) + '/' + (jwk && jwk.crv));
}
async function _jwsImportSignKey(jwk) {
  if (jwk && jwk.kty === 'OKP' && jwk.crv === 'Ed25519')
    return crypto.subtle.importKey('jwk', jwk, { name: 'Ed25519' }, false, ['sign']);
  if (jwk && jwk.kty === 'EC' && jwk.crv === 'P-256')
    return crypto.subtle.importKey('jwk', jwk, { name: 'ECDSA', namedCurve: 'P-256' }, false, ['sign']);
  throw new Error('JWS: nicht unterstützter Sign-Schlüssel (kty/crv): ' + (jwk && jwk.kty) + '/' + (jwk && jwk.crv));
}

/* ── _signJWS — payload (Objekt oder String) → JWS Compact ────────────────
   opts: { alg?, typ?, kid? }. alg wird sonst aus dem Schlüssel abgeleitet. */
async function _signJWS(payload, privateKey, opts) {
  opts = opts || {};
  const alg = opts.alg || _jwsAlgFuerKey(privateKey);
  const header = { alg: alg, typ: opts.typ || JWS_TYP };
  if (opts.kid) header.kid = opts.kid;
  const h = _jwsB64uFromString(JSON.stringify(header));
  const p = _jwsB64uFromString(typeof payload === 'string' ? payload : JSON.stringify(payload));
  const signingInput = h + '.' + p;
  const sig = await crypto.subtle.sign(
    _jwsWebCryptoParams(alg), privateKey, new TextEncoder().encode(signingInput)
  );
  return signingInput + '.' + _jwsB64uFromBytes(new Uint8Array(sig));
}

/* ── _verifyJWS — prüft Signatur UND Gültigkeit (Ablauf + Beginn) ──────────────────────────
   Rückgabe: { gueltig:boolean, grund:string, header, nutzlast, abgelaufen?, vorGueltigkeit? }
   opts: { jetzt? (Date/ISO für Tests) }. Lehnt bei alg-Mismatch (Algorithmus-
   Confusion), defekter Signatur, überschrittenem expirationDate/validUntil/exp
   ODER noch nicht erreichtem validFrom/nbf ab. issuanceDate (Ausstell-Zeitpunkt,
   kein Gültigkeits-Rand) wird nicht extrahiert/geprüft. */
async function _verifyJWS(jwsCompact, publicKey, opts) {
  opts = opts || {};
  const jetzt = opts.jetzt ? new Date(opts.jetzt) : new Date();
  const r = { gueltig: false, grund: '', header: null, nutzlast: null };
  if (typeof jwsCompact !== 'string') { r.grund = 'JWS: kein String'; return r; }
  const teile = jwsCompact.split('.');
  if (teile.length !== 3) { r.grund = 'JWS: kein Compact-Format (3 Teile erwartet)'; return r; }
  const h = teile[0], p = teile[1], s = teile[2];
  try { r.header   = JSON.parse(_jwsB64uToString(h)); } catch (e) { r.grund = 'JWS: Header nicht lesbar';  return r; }
  try { r.nutzlast = JSON.parse(_jwsB64uToString(p)); } catch (e) { r.grund = 'JWS: Payload nicht lesbar'; return r; }
  let keyAlg;
  try { keyAlg = _jwsAlgFuerKey(publicKey); } catch (e) { r.grund = e.message; return r; }
  if (r.header.alg !== keyAlg) {
    r.grund = 'JWS: alg-Mismatch (Header ' + r.header.alg + ' ≠ Schlüssel ' + keyAlg + ')';
    return r;
  }
  let ok = false;
  try {
    ok = await crypto.subtle.verify(
      _jwsWebCryptoParams(keyAlg), publicKey, _jwsB64uToBytes(s),
      new TextEncoder().encode(h + '.' + p)
    );
  } catch (e) { r.grund = 'JWS: Verify-Fehler — ' + e.message; return r; }
  if (!ok) { r.grund = 'JWS: Signatur ungültig'; return r; }
  // Ablaufdatum: W3C VC 1.1 (expirationDate), VC 2.0 (validUntil), JWT (exp/Sekunden).
  const n = r.nutzlast;
  const ablauf = n.expirationDate || n.validUntil ||
                 (typeof n.exp === 'number' ? new Date(n.exp * 1000).toISOString() : null);
  if (ablauf) {
    const t = new Date(ablauf).getTime();
    if (!isNaN(t) && t < jetzt.getTime()) {
      r.abgelaufen = true;
      r.grund = 'JWS: abgelaufen (' + ablauf + ')';
      return r;
    }
  }
  // Gültigkeitsbeginn: VC 2.0 (validFrom), JWT (nbf/Sekunden) — vor dem Beginn nicht gültig.
  const beginn = n.validFrom ||
                 (typeof n.nbf === 'number' ? new Date(n.nbf * 1000).toISOString() : null);
  if (beginn) {
    const tb = new Date(beginn).getTime();
    if (!isNaN(tb) && tb > jetzt.getTime()) {
      r.vorGueltigkeit = true;
      r.grund = 'JWS: noch nicht gültig (' + beginn + ')';
      return r;
    }
  }
  r.gueltig = true;
  r.grund = 'ok';
  return r;
}

// SYNC-VERMERK (U2-ADR-037 / Trust-1A, 24.06.2026): Diese Sentinel-Verifikation ist in der

// hier scharfgeschaltet wird, MUSS dieser Anker mit der Bürger-App synchronisiert werden — bis dahin
// bleibt der Sentinel bewusst stehen (kein toter Tausch ohne aktiven Pfad).
const TEST_SENTINEL_PUBLIC_JWK = Object.freeze({
  kty: 'OKP',
  crv: 'Ed25519',
  alg: 'Ed25519',
  x: 'kmz5gD4oi4pZe0CdR7FhXahRnjZqrAkKCe0VNskNf60',
  // Kennzeichnung im Schlüssel selbst — sticht in Logs/Inspektion sofort hervor.
  kid: 'vivodepot-test-sentinel-do-not-use-in-production',
});
// Issuer-Identifier, den ein Test-VC trägt (Doku-Kontext, nicht produktiv).
const TEST_SENTINEL_ISSUER = 'did:web:vivodepot.de';

// Verifiziert ein Anbieter-Zertifikat (JWS Compact) gegen den Test-Sentinel.
// Liefert das _verifyJWS-Ergebnis, angereichert um istTestSentinel:true.
async function verifiziereProviderCredentialGegenSentinel(jwsCompact, opts) {
  const sentinelKey = await _jwsImportVerifyKey(TEST_SENTINEL_PUBLIC_JWK);
  const res = await _verifyJWS(jwsCompact, sentinelKey, opts);
  res.istTestSentinel = true;
  return res;
}

// Prüft, ob ein importierter Public-Key (JWK) dem Test-Sentinel entspricht
// (Sentinel-Schutz im VC-Issuer: rote Markierung). Vergleich über x + crv.
function istTestSentinelKey(jwk) {
  return !!(jwk && jwk.kty === 'OKP' && jwk.crv === 'Ed25519'
            && jwk.x === TEST_SENTINEL_PUBLIC_JWK.x);
}

  return { fertig: false, i: p.index, n: slot.n, empfangen: slot.stuecke.size, fehlend };
}

// räumt vorher auf", analog zur Bürger-App): zentral hier statt bei den Aufrufern — der

/* ── F-2 Datei öffnen ─────────────────────────────────────────────────────── */
function onDateiGewaehlt(ev) {
  const datei = ev && ev.target && ev.target.files && ev.target.files[0];
  if (!datei) return;
  const reader = new FileReader();
  reader.onload = () => {
    let obj;
    try { obj = JSON.parse(magicStrippen(reader.result).json); }
    catch (e) { renderFehler(STRINGS.dateiUnlesbar); return; }
    verarbeiteDatei(obj);
  };
  reader.onerror = () => renderFehler(STRINGS.dateiUnlesbar);
  reader.readAsText(datei);
}

function verarbeiteDatei(obj) {
  const format = erkenneFormat(obj);
  if (format === 'voll') {
    // U2-ADR-078: kein passwortloser Notfall-Cache mehr — ein Voll-Depot wird nur mit dem
    // Übergabe-Passwort geöffnet.
    renderPasswort('voll', obj);
  } else if (format === 'blackbox') {
    renderPasswort('sub', obj.umschlag, obj);
  } else if (format === 'klartext') {
    klartextWarnung = true;
    leseModus = 'anker'; subInfo = null;
    data = _foldVollmachtenLesen(obj.depot);
    renderVollExport();
  } else if (format === 'klartext-roh') {
    klartextWarnung = true;
    leseModus = 'anker'; subInfo = null;
    data = _foldVollmachtenLesen(obj);
    renderVollExport();
  } else if (format === 'qr-pdf') {
    renderQrPdf(obj);
  } else if (format === 'qr-bereich') {
    renderQrBereich(obj);
  } else {
    renderFehler(STRINGS.formatUnbekannt);
  }
}

// U2-ADR-082: QR-Selbstauskunft-Sichten — kein Depot-Umschlag, kein Passwort-Gate. Beide
// Nutzlasten sind unverschlüsselte, von der Bürgerin bewusst als QR freigegebene Selbstauskunft

  if (obj.stand) html += '<p class="notfall-stand">' + escapeHTML(STRINGS.notfallStand) + ': ' + escapeHTML(String(obj.stand)) + '</p>';
  const bereiche = (Array.isArray(obj.bereiche) ? obj.bereiche : []).filter((b) => b && !b.leer);

// U2-ADR-078: der passwortlose Notfall-Cache-Knopf ist entfernt — ein zugesandtes Depot wird
// NUR mit dem Übergabe-Passwort geöffnet. Ein alter Umschlag mit `notfallCache`-Klartext-Geschwister
// wird hier NICHT mehr passwortlos angezeigt (das war das Art-9-Leck aus ADR-099/109).
function renderPasswort(art, umschlag, blackboxDatei) {
  const wrap = el('app');
  setModusFarbe(art === 'sub' ? 'sub' : 'anker');
  wrap.className = 'sheet-screen';
  const hint = art === 'sub' ? STRINGS.pwHintSub : STRINGS.pwHintVoll;
  wrap.innerHTML =
    '<div class="sheet">' +
      '<h2>' + escapeHTML(STRINGS.pwTitel) + '</h2>' +
      '<p class="hint">' + escapeHTML(hint) + '</p>' +
      '<form id="pw-form" autocomplete="off">' +
        '<input type="password" id="pw-feld" class="pw-feld" placeholder="' + escapeHTML(STRINGS.pwPlaceholder) + '" autocomplete="off">' +
        '<div class="pw-fehler" id="pw-fehler" hidden></div>' +
        '<div class="sheet-aktionen">' +
          '<button type="button" class="btn btn-sek" id="btn-zurueck">' + escapeHTML(STRINGS.zurueck) + '</button>' +
          '<button type="submit" class="btn">' + escapeHTML(STRINGS.pwOeffnen) + '</button>' +
        '</div>' +
      '</form>' +
    '</div>';
  el('btn-zurueck').addEventListener('click', renderWelcome);   // Aufräumung sitzt jetzt zentral in renderWelcome()
  const form = el('pw-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = el('pw-feld').value;       // nie loggen, nie in URL
    try {
      let obj;
      if (art === 'sub') obj = await leseSubUmschlag(umschlag, pw);
      else obj = await leseDepotUmschlag(umschlag, pw);
      el('pw-feld').value = '';            // Klartext-Passwort sofort aus dem Feld räumen
      data = _foldVollmachtenLesen(obj);
      if (art === 'sub') {
        leseModus = 'sub';
        subInfo = { inhaberin: (blackboxDatei && blackboxDatei.inhaberin) || '', bezeichnung: (blackboxDatei && blackboxDatei.bezeichnung) || '' };
      } else { leseModus = 'anker'; subInfo = null; }
      renderVollExport();
    } catch (err) {
      const f = el('pw-fehler'); f.textContent = STRINGS.pwFalsch; f.hidden = false;
      el('pw-feld').value = '';
      el('pw-feld').focus();
    }
  });
  const pf = el('pw-feld'); if (pf && pf.focus) pf.focus();
}

/* ── U2-ADR-037: read-only Spiegelung der eingewanderten Template-Felder ─────
   data.feldDefinitionen[] liegt bereits im entschlüsselten Depot — die Lese-App
   rendert es nur (KEINE Prüfung, KEINE Krypto, schlafende VC-Kopie bleibt schlafend).
   Adapter auf die Lese-feldZeileHTML; nur renderbare flache Typen; codierte Felder
   als Rohwert (keine Code-Auflösung). Defensiv (|| []), kein Verlass auf Init. */
const _TPL_RENDER_TYPEN = new Set(['text', 'zahl', 'datum', 'auswahl']);
function _tplDefAlsFeld(def) {
  const typ = (def.mehrzeilig && def.typ === 'text') ? 'textarea' : def.typ;
  return { id: def.feldId, typ: typ, label: def.label || def.feldId };
}
function _tplAbschnitte(sektorId) {
  const defs = (data && Array.isArray(data.feldDefinitionen))
    ? data.feldDefinitionen.filter(d => d && d.sektorId === sektorId && _TPL_RENDER_TYPEN.has(d.typ)) : [];
  const gruppen = [], byLabel = Object.create(null);
  for (const d of defs) {
    const label = (d.abschnitt != null && d.abschnitt !== '') ? String(d.abschnitt) : 'Weitere Felder';
    if (!byLabel[label]) { byLabel[label] = { label: label, felder: [] }; gruppen.push(byLabel[label]); }
    byLabel[label].felder.push(d);
  }
  return gruppen;
}
// Ein Bereich, alle Sektionen/Felder read-only.
function sektorHTML(sektorId) {
  const sek = SEKTOR_BY_ID[sektorId];
  if (!sek) return '';
  let html = '<div class="bereich">' +
    '<div class="bereich-kopf"><h2>' + escapeHTML(sek.label) + '</h2></div>';
  if (sek.einfuehrungstext) html += '<p class="bereich-intro">' + escapeHTML(sek.einfuehrungstext) + '</p>';
  const daten = (data && data.sektoren && data.sektoren[sektorId]) || {};
  for (const sektion of (sek.sektionen || [])) {
    const felder = sektion.felder || [];
    // Sektion auslassen, wenn kein Feld eingetragen ist (kompakte Lese-Sicht).
    const sichtbar = felder.filter(f => feldEingetragen(f, daten[f.id]));
    if (!sichtbar.length) continue;
    html += '<div class="sektion"><h3 class="sektion-titel">' + escapeHTML(sektion.label || '') + '</h3>';
    for (const f of sichtbar) {
      html += feldZeileHTML(sektorId, f, daten[f.id]);
    }
    html += '</div>';
  }
  // U2-ADR-037: eingewanderte Template-Felder read-only ans Bereich-Ende spiegeln (gleicher Look
  // wie Kern-Felder; Wert aus dem geteilten Slot daten[feldId]; leere + unbekannte Typen übersprungen).
  for (const g of _tplAbschnitte(sektorId)) {
    const sichtbar = g.felder.filter(d => feldEingetragen(_tplDefAlsFeld(d), daten[d.feldId]));
    if (!sichtbar.length) continue;
    html += '<div class="sektion"><h3 class="sektion-titel">' + escapeHTML(g.label) + '</h3>';
    for (const d of sichtbar) html += feldZeileHTML(sektorId, _tplDefAlsFeld(d), daten[d.feldId]);
    html += '</div>';
  }
  // Falls gar nichts eingetragen ist
  if (!html.includes('feld-zeile')) html += '<p class="leer-bereich">' + escapeHTML(STRINGS.leerZustand) + '</p>';
  html += '</div>';
  return html;
}

function feldZeileHTML(sektorId, feld, roh) {
  // Listen-Felder ausführlicher zeigen (jeder Eintrag eine Unterzeile)
  if (feld.typ === 'liste' && Array.isArray(roh) && roh.length && Array.isArray(feld.unterFelder) && feld.unterFelder.length) {
    let inner = '<div class="feld-zeile feld-liste"><div class="feld-label">' + escapeHTML(feld.label) + '</div><div class="feld-wert">';
    inner += '<ul class="liste-eintraege">';
    for (const e of roh) {
      const z = listenEintragZusammenfassung(feld, e);
      if (z) inner += '<li>' + escapeHTML(z) + '</li>';
    }
    inner += '</ul></div></div>';
    return inner + urheberschaftZeileHTML(sektorId, feld.id);
  }
  // ref:mappe mit Bild → Thumbnail
  let wertHTML;
  if (feld.typ === 'ref' && (feld.entitaet === 'mappe') && roh && roh.ref) {
    const m = mappeEintrag(roh.ref);
    if (m && /^image\//.test(m.mime || '') && /^data:/.test(m.inhalt || '')) {
      wertHTML = '<img class="mappe-thumb" alt="' + escapeHTML(m.beschriftung || m.dateiname || '') + '" src="' + escapeHTML(m.inhalt) + '">';
    } else {
      wertHTML = escapeHTML(feldWertText(feld, roh));
    }
  } else {
    wertHTML = escapeHTML(feldWertText(feld, roh)).replace(/\n/g, '<br>');
  }
  return '<div class="feld-zeile"><div class="feld-label">' + escapeHTML(feld.label) + '</div>' +
    '<div class="feld-wert">' + wertHTML + '</div></div>' +
    urheberschaftZeileHTML(sektorId, feld.id);
}

      '</div>' +
    '</div>';
  el('btn-zurueck').addEventListener('click', () => { qrTeile.clear(); renderWelcome(); });
  el('btn-qr-lesen').addEventListener('click', () => {
    const text = el('qr-text').value || '';
    verarbeiteQrText(text, (msg) => { const f = el('qr-fortschritt'); f.textContent = msg; f.hidden = false; },
      (msg) => { const f = el('qr-fehler'); f.textContent = msg; f.hidden = false; });
    el('qr-text').value = '';
  });
}
// Verarbeitet einen QR-Inhalt: Mehr-Teile sammeln, sonst direkt Notfall-Klartext.
// onFund (optional, U2-ADR-082-Nachtrag): feuert GENAU dann, wenn die Sicht gleich wechselt
// (Fund komplett) — explizites Signal für Aufrufer, die währenddessen eine Ressource offen
// halten (z. B. die Kamera), statt das per DOM-Abfrage zu erraten.
function verarbeiteQrText(text, onFortschritt, onFehler, onFund) {
  const teil = qrTeilAufnehmen(text);
  if (teil && !teil.fertig) {
    const msg = STRINGS.qrTeilFortschritt
      .replace('{i}', teil.i).replace(/\{n\}/g, teil.n)
      .replace('{empfangen}', teil.empfangen).replace('{liste}', teil.fehlend.join(', '));
    onFortschritt && onFortschritt(msg);
    return;
  }
  const ganzText = teil && teil.fertig ? teil.text : text;
  const notfall = parseNotfallQrText(ganzText);
  if (notfall && notfall.zeilen.length) {
    onFund && onFund();
    notfallStufe1 = notfall; leseModus = 'notfall'; renderNotfall(); return;
  }
  // evtl. ein eingefügtes JSON (Datei-Inhalt als Text)
  try {
    const obj = JSON.parse(ganzText);
    onFund && onFund();
    verarbeiteDatei(obj); return;
  } catch (e) { /* kein JSON */ }
  onFehler && onFehler(STRINGS.qrUnlesbar);
}

/* ── Hinweis / Fehler / Schließen ─────────────────────────────────────────── */
function renderHinweisMitZurueck(text) {
  const wrap = el('app');
  setModusFarbe('anker');
  wrap.className = 'sheet-screen';
  wrap.innerHTML = '<div class="sheet"><p class="hint">' + escapeHTML(text) + '</p>' +
    '<div class="sheet-aktionen"><button class="btn btn-sek" id="btn-zurueck">' + escapeHTML(STRINGS.zurueck) + '</button></div></div>';
  el('btn-zurueck').addEventListener('click', renderWelcome);
}
function renderFehler(text) { renderHinweisMitZurueck(text); }

function onSchliessen() {
  // entladen() nimmt keine Parameter — frühere Aufrufe hier und beim Zurück-Knopf übergaben
  // entladen(true)/entladen(false), die die Funktion nie las (CC-Auftrag Eingangsschirm,
  // 20.07.2026). Sofortiges Abräumen bleibt hier bewusst zusätzlich zur zentralen Prüfung in
  // renderWelcome() stehen — früher als das erst beim Klick auf „Neu".
  entladen();
  const wrap = el('app');
  setModusFarbe('anker');
  wrap.className = 'sheet-screen';
  wrap.innerHTML = '<div class="sheet"><p class="hint">' + escapeHTML(STRINGS.schliessenHinweis) + '</p>' +
    '<div class="sheet-aktionen"><button class="btn" id="btn-neu">' + escapeHTML(STRINGS.zurueck) + '</button></div></div>';
  el('btn-neu').addEventListener('click', renderWelcome);
}

// F-6 — alles aus dem RAM entladen. Es gibt nichts zu persistieren (kein Storage),
// daher genügt das Nullen der Modul-Referenzen; GC räumt den Rest.
function entladen() {
  data = null;
  leseModus = 'anker';
  subInfo = null;
  klartextWarnung = false;
  notfallStufe1 = null;
  qrTeile.clear();
  aktiverSektorId = null;
  // best effort: Session-Schlüssel-Globals des VdCrypto-Blocks nullen, falls vorhanden
  try { if (typeof sessionHkdfKey !== 'undefined') sessionHkdfKey = null; } catch (e) {}
}

/* ── Boot ─────────────────────────────────────────────────────────────────── */
function boot() {
  // Defensive: niemals persistente Speicher anfassen. (Es gibt im Code keinen Zugriff;
  // dieser Block dokumentiert die Invariante und ist ein no-op.)
  renderWelcome();
}
if (typeof document !== 'undefined' && document.addEventListener) {
  document.addEventListener('DOMContentLoaded', boot);
}
</script>
